# netlify.toml
[build]
  functions = "functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/auth/signup"
  to = "/.netlify/functions/auth-signup"
  status = 200

[[redirects]]
  from = "/api/auth/verify-otp"
  to = "/.netlify/functions/auth-verify-otp"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/emergent/session"
  to = "/.netlify/functions/auth-emergent-session"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/folders"
  to = "/.netlify/functions/folders"
  status = 200

[[redirects]]
  from = "/api/notes"
  to = "/.netlify/functions/notes"
  status = 200

[[redirects]]
  from = "/api/notes/:id"
  to = "/.netlify/functions/notes-id?id=:id"
  status = 200

[[redirects]]
  from = "/api/ai/transcribe"
  to = "/.netlify/functions/ai-transcribe"
  status = 200

[[redirects]]
  from = "/api/ai/rewrite"
  to = "/.netlify/functions/ai-rewrite"
  status = 200
